<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Segoe UI", sans-serif; background: #0f1117; color: #e0e0e0; }
header { background: #1a1d2e; padding: 16px 24px; border-bottom: 2px solid #2d3561; display: flex; align-items: center; justify-content: space-between; }

.back-link { color: #8b92a5; text-decoration: none; font-size: 0.85rem; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; padding: 20px 24px; }
.metric { background: #1a1d2e; border: 1px solid #2d3561; border-radius: 10px; padding: 16px; }
.metric .label { font-size: 0.75rem; color: #8b92a5; margin-bottom: 4px; }
.metric .value { font-size: 1.6rem; font-weight: 700; color: #e0e0e0; }
.metric .sub { font-size: 0.78rem; color: #8b92a5; margin-top: 2px; }
.filter-bar { padding: 12px 24px; background: #1a1d2e; border-bottom: 1px solid #2d3561; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
.filter-bar label { font-size: 0.75rem; color: #8b92a5; display: block; margin-bottom: 3px; }
.filter-bar select { background: #0f1117; border: 1px solid #2d3561; color: #e0e0e0; padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; }
.chart-wrap { padding: 20px 24px; }
.chart-box { background: #1a1d2e; border: 1px solid #2d3561; border-radius: 12px; padding: 20px; height: 340px; }
.chart-box h3 { font-size: 0.9rem; color: #a78bfa; margin-bottom: 12px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 24px 20px; }
table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
thead th { padding: 10px 12px; text-align: left; color: #8b92a5; border-bottom: 1px solid #2d3561; }
tbody td { padding: 9px 12px; border-bottom: 1px solid #1a1d2e; }
tbody tr:hover { background: #20233a; }
.section { background: #1a1d2e; border: 1px solid #2d3561; border-radius: 12px; padding: 16px; overflow: auto; max-height: 360px; }
.section h3 { font-size: 0.9rem; color: #a78bfa; margin-bottom: 12px; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
</style>

let trendChart = null;

const COLORS = ['#7c3aed','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#3b82f6'];
const CAT_COLOR = {};
_DATA.categories.forEach((c,i) => CAT_COLOR[c] = COLORS[i % COLORS.length]);

// populate filters
const catSel = document.getElementById('f-cat');
const yearSel = document.getElementById('f-year');
const modelSel = document.getElementById('f-model');
_DATA.categories.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; catSel.appendChild(o); });
[...new Set(_DATA.records.map(r=>r.year))].sort().forEach(y => { const o=document.createElement('option'); o.value=y; o.textContent=y; yearSel.appendChild(o); });
_DATA.models.forEach(m => { const o=document.createElement('option'); o.value=m; o.textContent=m; modelSel.appendChild(o); });

function filtered() {
  const cat = catSel.value, year = yearSel.value ? +yearSel.value : null, mdl = modelSel.value;
  return _DATA.records.filter(r =>
    (!cat || r.category===cat) &&
    (!year || r.year===year) &&
    (!mdl || r.model===mdl)
  );
}

function wkey(year, week) { return year*100 + parseInt(week.replace('W','')); }

function render() {
  const recs = filtered();
  document.getElementById('data-info').textContent = `총 ${recs.length.toLocaleString()}건`;

  // Summary
  const total = recs.reduce((s,r)=>s+r.qty,0);
  const weeks = [...new Set(recs.map(r=>r.year+'-'+r.week))].sort((a,b)=>{
    const [ay,aw]=a.split('-'); const [by,bw]=b.split('-');
    return wkey(+ay,aw)-wkey(+by,bw);
  });
  const lastWk = weeks[weeks.length-1]||'';
  const lastQty = recs.filter(r=>r.year+'-'+r.week===lastWk).reduce((s,r)=>s+r.qty,0);
  const prevWk = weeks[weeks.length-2]||'';
  const prevQty = recs.filter(r=>r.year+'-'+r.week===prevWk).reduce((s,r)=>s+r.qty,0);
  const wow = prevQty>0 ? ((lastQty-prevQty)/prevQty*100).toFixed(1) : null;

  const topModel = Object.entries(recs.reduce((acc,r)=>{acc[r.model]=(acc[r.model]||0)+r.qty;return acc;},{}))
    .sort((a,b)=>b[1]-a[1])[0]||['—',0];

  document.getElementById('summary').innerHTML = `
    <div class="metric"><div class="label">누적 Sell-out</div><div class="value">${Math.round(total).toLocaleString()}</div><div class="sub">units (필터 기준)</div></div>
    <div class="metric"><div class="label">최근 주차</div><div class="value">${lastWk}</div><div class="sub">${Math.round(lastQty).toLocaleString()} units</div></div>
    <div class="metric"><div class="label">WoW</div><div class="value" style="color:${wow>0?'#34d399':wow<0?'#f87171':'#e0e0e0'}">${wow!==null?(wow>0?'+':'')+wow+'%':'—'}</div><div class="sub">전주 대비</div></div>
    <div class="metric"><div class="label">Top 모델</div><div class="value" style="font-size:1rem">${topModel[0]}</div><div class="sub">${Math.round(topModel[1]).toLocaleString()} units</div></div>
    <div class="metric"><div class="label">데이터 기간</div><div class="value" style="font-size:1rem">${weeks[0]||'—'}</div><div class="sub">~ ${lastWk}</div></div>
  `;

  // Trend chart
  const wkLabels = weeks.slice(-24);
  const cats = catSel.value ? [catSel.value] : _DATA.categories;
  const datasets = cats.map(cat => {
    const vals = wkLabels.map(wk => {
      const [y,w] = wk.split('-');
      return recs.filter(r=>r.category===cat&&r.year+'-'+r.week===wk).reduce((s,r)=>s+r.qty,0);
    });
    return { label: cat, data: vals, borderColor: CAT_COLOR[cat], backgroundColor: CAT_COLOR[cat]+'33', tension: 0.3, fill: false, pointRadius: 3 };
  });
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trend-chart').getContext('2d'), {
    type: 'line',
    data: { labels: wkLabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8b92a5', boxWidth: 12 } } },
      scales: {
        x: { ticks: { color: '#8b92a5', maxRotation: 45 }, grid: { color: '#2d3561' } },
        y: { ticks: { color: '#8b92a5' }, grid: { color: '#2d3561' } }
      }
    }
  });

  // Model table
  const modelTotals = Object.entries(
    recs.reduce((acc,r)=>{ if(!acc[r.model]) acc[r.model]={qty:0,sellthru:[],cat:r.category}; acc[r.model].qty+=r.qty; if(r.sellthru>0) acc[r.model].sellthru.push(r.sellthru); return acc; },{}))
    .sort((a,b)=>b[1].qty-a[1].qty).slice(0,30);
  document.getElementById('model-tbody').innerHTML = modelTotals.map(([m,v])=>{
    const st = v.sellthru.length ? (v.sellthru.reduce((a,b)=>a+b,0)/v.sellthru.length).toFixed(1)+'%' : '—';
    return `<tr><td><strong>${m}</strong></td><td style="color:#8b92a5;font-size:0.75rem">${v.cat}</td><td>${Math.round(v.qty).toLocaleString()}</td><td>${st}</td></tr>`;
  }).join('');

  // Week table
  const weekTotals = weeks.map((wk,i)=>{
    const qty = recs.filter(r=>r.year+'-'+r.week===wk).reduce((s,r)=>s+r.qty,0);
    const prev = i>0 ? recs.filter(r=>r.year+'-'+r.week===weeks[i-1]).reduce((s,r)=>s+r.qty,0) : null;
    const w = prev!==null&&prev>0 ? ((qty-prev)/prev*100).toFixed(1) : null;
    return {wk, qty, w};
  }).reverse().slice(0,24);
  document.getElementById('week-tbody').innerHTML = weekTotals.map(v=>{
    const wc = v.w>0?'#34d399':v.w<0?'#f87171':'#e0e0e0';
    return `<tr><td>${v.wk}</td><td>${Math.round(v.qty).toLocaleString()}</td><td style="color:${wc}">${v.w!==null?(v.w>0?'+':'')+v.w+'%':'—'}</td></tr>`;
  }).join('');
}

render();
</script>
